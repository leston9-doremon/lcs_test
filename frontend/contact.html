<!DOCTYPE html>
<html lang="en">
<head></head>
<body>

<!-- TOP BAR -->

<section style="padding: 80px 0; background: var(--light-bg);">
  <div class="container" style="max-width: 1200px;">
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 50px;">
      
      <!-- Contact Information -->
      <div>
        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--navy); margin-bottom: 30px; font-weight: 700;">Contact Information</h2>
        
        <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 25px;">
          <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <div style="width: 50px; height: 50px; background: var(--gold-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">📍</div>
            <div style="flex: 1;">
              <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Address</p>
              <p style="color: var(--text); line-height: 1.6; font-size: 1rem;">Loretto Central School<br>Loretto, Amtady Village<br>Bantwal, Dakshina Kannada<br>Karnataka - 574211, India</p>
            </div>
          </div>
        </div>

        <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 25px;">
          <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <div style="width: 50px; height: 50px; background: var(--gold-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">📞</div>
            <div style="flex: 1;">
              <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Phone</p>
              <p style="color: var(--text); font-size: 1.1rem; font-weight: 600;"><a href="tel:+919480663011" style="color: var(--navy); text-decoration: none;">+91 9480663011</a></p>
            </div>
          </div>
        </div>

        <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
          <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <div style="width: 50px; height: 50px; background: var(--gold-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">✉️</div>
            <div style="flex: 1;">
              <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Email</p>
              <p style="color: var(--text); font-size: 1rem; margin-bottom: 5px;"><a href="mailto:lorettocentralschool@gmail.com" style="color: var(--navy); text-decoration: none;">lorettocentralschool@gmail.com</a></p>
              <p style="color: var(--text); font-size: 1rem;"><a href="mailto:schoolloreto@gmail.com" style="color: var(--navy); text-decoration: none;">schoolloreto@gmail.com</a></p>
            </div>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div>
        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--navy); margin-bottom: 30px; font-weight: 700;">Send Us a Message</h2>
        
        <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
          <form id="contactForm">
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--navy); font-size: 0.95rem;">Name <span style="color: #dc2626;">*</span></label>
              <input type="text" id="name" required style="width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: 'Nunito', sans-serif; transition: border-color 0.3s;">
            </div>

            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--navy); font-size: 0.95rem;">Email <span style="color: #dc2626;">*</span></label>
              <input type="email" id="email" required style="width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: 'Nunito', sans-serif; transition: border-color 0.3s;">
            </div>

            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--navy); font-size: 0.95rem;">Phone</label>
              <input type="tel" id="phone" style="width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: 'Nunito', sans-serif; transition: border-color 0.3s;">
            </div>

            <div style="margin-bottom: 25px;">
              <label style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--navy); font-size: 0.95rem;">Message <span style="color: #dc2626;">*</span></label>
              <textarea id="message" required rows="5" style="width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: 'Nunito', sans-serif; resize: vertical; transition: border-color 0.3s;"></textarea>
            </div>

            <button type="submit" style="width: 100%; padding: 15px; background: var(--navy); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; font-family: 'Nunito', sans-serif;">
              Send Message
            </button>
          </form>

          <div id="formMessage" style="margin-top: 20px; padding: 15px; border-radius: 8px; display: none;"></div>
        </div>
      </div>

    </div>

    <!-- Map Section -->
    <div style="margin-top: 50px;">
      <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--navy); margin-bottom: 30px; font-weight: 700; text-align: center;">📍 Find Us on Map</h2>
      
      <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3889.0!2d75.038002!3d12.924451!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTLCsDU1JzI4LjAiTiA3NcKwMDInMTYuOCJF!5e0!3m2!1sen!2sin!4v1234567890"
          width="100%" 
          height="450" 
          style="border:0; border-radius: 8px;" 
          allowfullscreen="" 
          loading="lazy">
        </iframe>
      </div>
    </div>

  </div>
</section>

<style>
input:focus, textarea:focus {
  outline: none;
  border-color: var(--gold);
}

button:hover {
  background: var(--navy-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

@media (max-width: 768px) {
  div[style*="grid-template-columns: 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}
</style>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const formMessage = document.getElementById('formMessage');
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const message = document.getElementById('message').value;
  
  // Show success message
  formMessage.style.display = 'block';
  formMessage.style.background = '#d4edda';
  formMessage.style.color = '#155724';
  formMessage.style.border = '1px solid #c3e6cb';
  formMessage.innerHTML = '✅ Thank you for your message! We will get back to you soon.';
  
  // Clear form
  document.getElementById('contactForm').reset();
  
  // Hide message after 5 seconds
  setTimeout(() => {
    formMessage.style.display = 'none';
  }, 5000);
  
  // In a real implementation, you would send this data to a server
  console.log('Form submitted:', { name, email, phone, message });
});
</script>

<!-- FOOTER -->

  <script src="/components/Navbar.js"></script>
  <script src="/components/Footer.js"></script>
  <script src="/shared-data-loader.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const contact = await loadContactData();
      if (contact) {
        if (contact.address) {
          // Update address display
          const addrEl = document.querySelector('p[style*="font-size: 1rem"]');
          if (addrEl && addrEl.innerHTML.includes('Loretto Central School')) {
            addrEl.textContent = contact.address;
          }
        }
        if (contact.phone) {
          const phoneLinks = document.querySelectorAll('a[href^="tel:"]');
          phoneLinks.forEach(link => {
            link.href = `tel:${contact.phone.replace(/\s+/g, '')}`;
            link.textContent = contact.phone;
          });
        }
        if (contact.email) {
          const emailLinks = document.querySelectorAll('a[href^="mailto:"]');
          emailLinks.forEach(link => {
            link.href = `mailto:${contact.email}`;
            // If it's the primary email link, update text
            if (link.textContent.includes('gmail.com') || link.textContent.includes('school.edu')) {
               link.textContent = contact.email;
            }
          });
        }
      }
    });

    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Form message logic stays same
      const formMessage = document.getElementById('formMessage');
      formMessage.style.display = 'block';
      formMessage.style.background = '#d4edda';
      formMessage.style.color = '#155724';
      formMessage.style.border = '1px solid #c3e6cb';
      formMessage.innerHTML = '✅ Thank you for your message! We will get back to you soon.';
      document.getElementById('contactForm').reset();
      setTimeout(() => { formMessage.style.display = 'none'; }, 5000);
    });
  </script>
</body>
</html>
