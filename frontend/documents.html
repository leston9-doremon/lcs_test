<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documents | Loretto Central School</title>
  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0e6b6b;--navy-dark:#094f4f;--gold:#c8960c;--gold-light:#e8b020;--gold-pale:#f5e6c0;--white:#ffffff;--light-bg:#f9f6ef;--text:#1a2e2e;--text-muted:#5a6e6e;--border:#e2d5b0; }
    body { font-family:'Nunito',sans-serif;color:var(--text);background:var(--white); }
    .container { max-width:1160px;margin:0 auto;padding:0 24px; }
    .page-banner { background:linear-gradient(135deg,var(--navy-dark),var(--navy));padding:48px 0; }
    .page-banner h1 { font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:800;color:#fff; }
    .page-content { padding:60px 0; }
    .filter-bar { display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px; }
    .filter-btn { padding:7px 18px;border-radius:20px;border:2px solid var(--border);background:#fff;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s; }
    .filter-btn:hover,.filter-btn.active { background:var(--navy);color:#fff;border-color:var(--navy); }
    .docs-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px; }
    .doc-card { background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:flex-start;gap:14px;transition:box-shadow 0.2s,transform 0.2s; }
    .doc-card:hover { box-shadow:0 8px 24px rgba(14,107,107,0.10);transform:translateY(-2px); }
    .doc-icon { width:44px;height:44px;background:rgba(200,150,12,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0; }
    .doc-info { flex:1;min-width:0; }
    .doc-category { font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--gold);margin-bottom:4px; }
    .doc-title { font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.4; }
    .doc-date { font-size:0.75rem;color:var(--text-muted); }
    .doc-download { display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:var(--navy);color:#fff;padding:6px 14px;border-radius:6px;font-size:0.78rem;font-weight:700;text-decoration:none;transition:background 0.2s; }
    .doc-download:hover { background:var(--gold); }
    .empty-msg { text-align:center;padding:60px 0;color:var(--text-muted);font-size:0.95rem; }
  </style>
</head>
<body>

  <div class="page-banner">
    <div class="container">
      <h1>School Documents</h1>
    </div>
  </div>

  <section class="page-content">
    <div class="container">
      <!-- Category Filter -->
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" onclick="filterDocs('all', this)">All Documents</button>
      </div>
      <div id="docs-loading" style="text-align:center;padding:60px 0;color:#5a6e6e;">Loading documents...</div>
      <div class="docs-grid" id="docs-grid" style="display:none;"></div>
    </div>
  </section>

  <script src="/components/Navbar.js"></script>
  <script src="/components/Footer.js"></script>
  <script src="/shared-data-loader.js"></script>

  <script>
    let allDocs = [];

    const CATEGORY_ICONS = {
      'Mandatory Disclosure': '',
      'CBSE Circulars': '',
      'School Circulars': '',
      'Book List': '',
      'Fee Structure': '',
      'Results': '',
    };

    function filterDocs(category, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDocumentsList('docs-grid', category);
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderDocumentsList('docs-grid');
    });
  </script>
</body>
</html>
